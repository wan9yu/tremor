name: tremor daily

on:
  schedule:
    - cron: "0 22 * * *"  # daily at 22:00 UTC = 06:00 China (after the onshore FX close)
  workflow_dispatch: {}    # allow manual runs

permissions:
  contents: write          # commit the day's data back to the repo
  issues: write            # raise an alarm when a run fails (see the last step)

concurrency:
  group: tremor-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # The scoring rules are the instrument. If they have drifted, stop before
      # writing a row rather than committing readings judged by broken rules.
      - name: Check the scoring rules
        run: python -m unittest discover tests

      - name: Collect today's readings
        env:
          # FRED_API_KEY (credit spread) and FINGRID_API_KEY (grid frequency, with
          # a keyless Statnett fallback) are read from repo Secrets. Flights (keyless
          # community ADS-B) and the Korea premium need no key.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINGRID_API_KEY: ${{ secrets.FINGRID_API_KEY }}
        run: python collect.py

      - name: Render charts
        run: python render.py

      - name: Commit data and charts
        run: |
          git config user.name "tremor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ charts/ docs/data/
          git commit -m "data: $(date -u +%F)" || echo "no changes to commit"
          git push

      # A silent instrument is the failure mode that ends this project. The daily
      # commit is also what keeps the schedule alive — GitHub disables a cron
      # workflow after 60 days without repository activity — so a run that keeps
      # failing does not merely lose days, it eventually switches tremor off with
      # nobody told. Raise one open issue and keep appending to it.
      - name: Raise the alarm on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TITLE="tremor: the daily collection is failing"
          NUM=$(gh issue list --state open --search "$TITLE in:title" --json number \
                --jq '.[0].number // empty')
          BODY="Run failed on $(date -u +%F) — $RUN_URL

          The instrument writes no row for a failed run, and the schedule itself
          expires after 60 days without a commit. Fix or disable deliberately."
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
