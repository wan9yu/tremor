name: tremor daily

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch: {}    # allow manual runs

permissions:
  contents: write          # commit the day's data back to the repo

concurrency:
  group: tremor-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Collect today's readings
        env:
          # FRED_API_KEY (credit spread) and FINGRID_API_KEY (grid frequency, with
          # a keyless Statnett fallback) are read from repo Secrets. Flights (keyless
          # community ADS-B) and the Korea premium need no key.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINGRID_API_KEY: ${{ secrets.FINGRID_API_KEY }}
        run: python collect.py

      - name: Render charts
        run: python render.py

      - name: Commit data and charts
        run: |
          git config user.name "tremor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ charts/ docs/data/
          git commit -m "data: $(date -u +%F)" || echo "no changes to commit"
          git push
