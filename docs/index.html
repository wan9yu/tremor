<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>tremor — is the world actually more disordered?</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0e0f12; --panel:#16181d; --line:#23262e; --ink:#e7e9ee; --muted:#8a909c;
    --calm:#3fb27f; --amber:#e0a83d; --orange:#e07b39; --alarm:#d64545;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:960px;margin:0 auto;padding:28px 20px 64px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  header h1{font-size:30px;margin:0;letter-spacing:.5px}
  header p.tag{color:var(--muted);margin:.3em 0 0;font-size:15px}
  .langtoggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex:none}
  .langtoggle button{background:transparent;color:var(--muted);border:0;padding:5px 11px;
    font-size:12px;cursor:pointer;font-family:inherit}
  .langtoggle button.on{background:var(--line);color:var(--ink)}
  .count{display:flex;align-items:baseline;gap:14px;margin:26px 0 8px;cursor:pointer;
    padding:18px 22px;background:var(--panel);border:1px solid var(--line);border-radius:12px}
  .count:hover{border-color:#33373f}
  .count .n{font-size:54px;font-weight:700;line-height:1}
  .count .of{color:var(--muted);font-size:20px}
  .count .label{color:var(--muted);font-size:14px}
  .count .darknote{color:#ff6b6b;font-size:13px}
  .count .q{margin-left:auto;color:var(--muted);font-size:13px;align-self:center}
  .asof{color:var(--muted);font-size:13px;margin:0 0 16px}
  .sysstatus{border-radius:10px;padding:11px 15px;margin:0 0 18px;font-size:13px;
    border:1px solid var(--line);background:var(--panel)}
  .sysstatus .h{font-weight:600}
  .sysstatus.ok{border-color:rgba(63,178,127,.4)}
  .sysstatus.ok .h{color:var(--calm)}
  .sysstatus.warn{border-color:rgba(224,123,57,.5);background:rgba(224,123,57,.08)}
  .sysstatus.warn .h{color:var(--orange)}
  .sysstatus.alarm{border-color:var(--alarm);background:rgba(214,69,69,.12)}
  .sysstatus.alarm .h{color:#ff6b6b}
  .strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;margin:0 0 18px}
  @media(max-width:680px){.strip{grid-template-columns:1fr 1fr}}
  .inst{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;
    border-left:3px solid var(--dot,#7f8696);cursor:pointer;transition:border-color .12s}
  .inst:hover{border-top-color:#33373f;border-right-color:#33373f;border-bottom-color:#33373f}
  .inst.dark{border-left-color:var(--alarm);background:rgba(214,69,69,.07)}
  .inst .domain{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px}
  .inst .now{font-size:20px;font-weight:600;margin:6px 0 1px}
  .inst .now .u{font-size:12px;color:var(--muted);font-weight:400}
  .inst .nodata{color:#ff6b6b;font-size:15px;font-weight:600}
  .inst .sub{color:var(--muted);font-size:11px}
  .inst .more{color:#6f7686;font-size:10px;margin-top:6px}
  .pill{display:inline-block;font-size:10px;padding:1px 7px;border-radius:999px;
    border:1px solid var(--line);color:var(--muted);margin-left:6px;vertical-align:middle}
  .pill.trembling{color:#fff;background:var(--alarm);border-color:var(--alarm)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 16px 10px}
  .panel h2{font-size:14px;margin:0;font-weight:600}
  .panel .hint{color:var(--muted);font-size:12px;margin:2px 0 10px}
  .watchlist{color:var(--muted);font-size:12px;margin:14px 2px 0;line-height:1.5}
  .watchlist b{color:#9aa1ad;font-weight:600}
  .watchlist .dot{display:inline-block;width:7px;height:7px;border-radius:999px;background:#5b616d;margin-right:5px;vertical-align:middle}
  .watchlist .days{opacity:.7}
  footer{color:var(--muted);font-size:13px;margin-top:34px;border-top:1px solid var(--line);padding-top:18px}
  footer a{color:#9fb6ff}
  code{background:#1d2129;padding:1px 5px;border-radius:5px;font-size:12px}
  /* modal */
  .modal[hidden]{display:none}
  .modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6)}
  .modal-card{position:relative;max-width:540px;width:100%;max-height:85vh;overflow:auto;
    background:#15171c;border:1px solid var(--line);border-radius:14px;padding:24px 24px 22px;
    box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .modal-card .mdomain{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.7px}
  .modal-card h3{font-size:20px;margin:4px 0 2px}
  .modal-card .tags{margin:6px 0 14px}
  .modal-card .tag2{display:inline-block;font-size:11px;color:var(--muted);border:1px solid var(--line);
    border-radius:999px;padding:2px 9px;margin-right:6px}
  .modal-card p{font-size:14.5px;line-height:1.62;margin:0 0 12px}
  .modal-x{position:absolute;top:12px;right:14px;background:transparent;border:0;color:var(--muted);
    font-size:24px;line-height:1;cursor:pointer}
  .modal-x:hover{color:var(--ink)}
</style>
</head>

// ---------- CSV ----------
function splitCSVLine(line){
  const out=[]; let cur="", q=false;
  for(let i=0;i<line.length;i++){ const c=line[i];
    if(q){ if(c==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"') q=true; else if(c===",") {out.push(cur);cur="";} else cur+=c; } }
  out.push(cur); return out;
}
function parseCSV(text){
  const rows=text.replace(/﻿/,"").trim().split(/\r?\n/);
  if(rows.length<2) return [];
  const head=splitCSVLine(rows[0]);
  return rows.slice(1).filter(r=>r.length).map(r=>{ const cells=splitCSVLine(r), o={};
    head.forEach((h,i)=>o[h]=cells[i]??""); return o; });
}
async function getCSV(path){ try{ const r=await fetch(path,{cache:"no-store"}); if(!r.ok) return []; return parseCSV(await r.text()); }catch(e){ return []; } }

// ---------- normalization for display ----------
function median(a){ if(!a.length) return null; const b=[...a].sort((x,y)=>x-y), m=b.length>>1; return b.length%2?b[m]:(b[m-1]+b[m])/2; }
function displayZ(values){
  const present=values.filter(v=>v!=null && !isNaN(v));
  const med=median(present); if(med==null) return values.map(()=>null);
  const mad=median(present.map(v=>Math.abs(v-med)));
  let scale=mad>0?1.4826*mad:0;
  if(scale===0){ const mean=present.reduce((a,b)=>a+b,0)/present.length;
    scale=Math.sqrt(present.reduce((a,b)=>a+(b-mean)**2,0)/present.length); }
  return values.map(v=>(v==null||isNaN(v))?null:(scale>0?(v-med)/scale:0));
}
function fmt(v){ const n=parseFloat(v); return Math.abs(n)>=1000?n.toLocaleString():(""+v); }
function countColor(n){ return n>=3?"var(--alarm)":n===2?"var(--orange)":n===1?"var(--amber)":"var(--calm)"; }
function utcMidnight(d){ const p=d.split("-").map(Number); return Date.UTC(p[0],p[1]-1,p[2]); }
function nowUtcMidnight(){ const t=new Date(); return Date.UTC(t.getUTCFullYear(),t.getUTCMonth(),t.getUTCDate()); }

// ---------- modal ----------
function openModal(html){ document.getElementById("modal-body").innerHTML=html; document.getElementById("modal").hidden=false; }
function closeModal(){ document.getElementById("modal").hidden=true; }
document.getElementById("modal-x").onclick=closeModal;
document.getElementById("modal-backdrop").onclick=closeModal;
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

function lineModal(L,lang){
  const dir = L.alarm==="down"?T[lang].dirDown:T[lang].dirUp;
  return `<div class="mdomain">${L.domain[lang]}</div>
    <h3>${L.label[lang]}</h3>
    <div class="tags"><span class="tag2">${T[lang].alarmTag(dir)}</span><span class="tag2">${T[lang].source}: ${L.source[lang]}</span></div>
    <p>${L.explain[lang]}</p>`;
}
function resoModal(lang){ return `<h3>${T[lang].resoTitle}</h3><p>${T[lang].resoBody}</p>`; }

// ---------- data + render ----------
let DATA=null, chart=null;
async function load(){
  const summary=await getCSV("data/summary.csv");
  const lines={};
  for(const L of LINES) lines[L.id]=await getCSV("data/"+L.id+".csv");
  DATA={summary, dates:summary.map(r=>r.date), lines};
}

function render(){
  const lang=getLang();
  document.documentElement.lang = lang==="zh"?"zh":"en";
  document.querySelectorAll("#langtoggle button").forEach(b=>b.classList.toggle("on", b.dataset.lang===lang));
  document.getElementById("tag").textContent=T[lang].tag;
  document.getElementById("panel-title").textContent=T[lang].panelTitle;
  document.getElementById("panel-hint").textContent=T[lang].panelHint;
  document.getElementById("footer").innerHTML=T[lang].footer;
  document.getElementById("count-q").textContent=T[lang].countQ;

  const {summary,dates,lines}=DATA;
  const TIER1=LINES.filter(L=>(L.tier||1)===1);
  const TIER2=LINES.filter(L=>(L.tier||1)===2);
  document.getElementById("count-of").textContent=TIER1.length;
  const last=summary[summary.length-1];
  const gapDays=last?Math.floor((nowUtcMidnight()-utcMidnight(last.date))/86400000):null;
  const darkCount=last?(parseInt(last.dark_count||"0",10)||0):0;

  if(last){
    const n=parseInt(last.trembling_count||"0",10)||0;
    const el=document.getElementById("count-n"); el.textContent=n; el.style.color=countColor(n);
    const base = n===0?T[lang].calm:(n===1?T[lang].tremblingOne:T[lang].tremblingMany);
    document.getElementById("count-label").innerHTML =
      base + (darkCount?`<span class="darknote">${T[lang].darkNote(darkCount)}</span>`:"");
    document.getElementById("asof").textContent=T[lang].asof(last.date);
  }
  document.getElementById("count").onclick=()=>openModal(resoModal(lang));

  const strip=document.getElementById("strip"); strip.innerHTML="";
  const datasets=[]; const darkNames=[];
  for(const L of TIER1){
    const rows=lines[L.id]||[]; const byDate={}; rows.forEach(r=>byDate[r.date]=r);
    const raw=dates.map(d=>{ const r=byDate[d]; const v=r?parseFloat(r.raw_value):NaN; return isNaN(v)?null:v; });
    const tremble=dates.map(d=>byDate[d]&&byDate[d].trembling==="1");
    const z=displayZ(raw);
    const todayRow=last?byDate[last.date]:null;
    const hasToday=todayRow&&todayRow.raw_value!=="";
    const lastGood=[...rows].reverse().find(r=>r.raw_value!=="");
    const isTrembling=hasToday&&todayRow.trembling==="1";
    const isDark=!hasToday; if(isDark) darkNames.push(L.domain[lang]);

    const chip=document.createElement("div");
    chip.className="inst"+(isDark?" dark":""); chip.style.setProperty("--dot",L.color);
    let nowHtml, subHtml;
    if(hasToday){
      nowHtml=`${fmt(todayRow.raw_value)} <span class="u">${L.unit[lang]}</span>`+(isTrembling?`<span class="pill trembling">${lang==="zh"?"颤抖":"trembling"}</span>`:"");
      subHtml=`${L.label[lang]} · ${T[lang].alarmingWhen(L.alarm==="down"?T[lang].dirDown:T[lang].dirUp)}`;
    } else {
      nowHtml=`<span class="nodata">${T[lang].nodata}</span>`;
      const reason=todayRow?todayRow.source_note:T[lang].noCollect;
      subHtml=`${reason}${lastGood?T[lang].last(fmt(lastGood.raw_value),L.unit[lang],lastGood.date):""}`;
    }
    chip.innerHTML=`<div class="domain">${L.domain[lang]}</div>
      <div class="now">${nowHtml}</div>
      <div class="sub">${subHtml}</div>
      <div class="more">${T[lang].more}</div>`;
    chip.onclick=()=>openModal(lineModal(L,lang));
    strip.appendChild(chip);

    datasets.push({ label:L.label[lang], data:z, borderColor:L.color, backgroundColor:L.color,
      borderWidth:1.8, tension:.25, spanGaps:false,
      pointRadius:tremble.map(t=>t?4:2), pointHoverRadius:5,
      pointBackgroundColor:tremble.map(t=>t?"#d64545":L.color),
      pointBorderColor:tremble.map(t=>t?"#d64545":L.color) });
  }

  // system status banner
  const st=document.getElementById("sysstatus"); st.hidden=false;
  if(!last){ st.className="sysstatus alarm"; st.innerHTML=`<span class="h">${T[lang].nodata}</span>`; }
  else if(gapDays>=2){ st.className="sysstatus alarm"; st.innerHTML=`<span class="h">${T[lang].disruptH}</span>${T[lang].disruptB(last.date,gapDays)}`; }
  else if(darkCount>=3){ st.className="sysstatus alarm"; st.innerHTML=`<span class="h">${T[lang].alarmDarkH(darkCount,TIER1.length)}</span>${T[lang].alarmDarkB(darkNames.join(", "))}`; }
  else if(darkCount>=1){ st.className="sysstatus warn"; st.innerHTML=`<span class="h">${T[lang].warnH(darkCount)}</span>${T[lang].warnB(darkNames.join(", "))}`; }
  else { st.className="sysstatus ok"; st.innerHTML=`<span class="h">${T[lang].statusOk}</span>`+(gapDays>=1?T[lang].awaiting(last.date):""); }

  // Dashed ±3 trembling-threshold guides — visual reference only, kept out of
  // the legend and the hover tooltip so only the real lines are listed.
  const thr=v=>({label:(v>0?"+":"")+v, _threshold:true, data:dates.map(()=>v),
    borderColor:"rgba(214,69,69,.45)", borderWidth:1, borderDash:[5,4],
    pointRadius:0, pointHoverRadius:0, fill:false, tension:0});
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById("chart"),{
    type:"line", data:{ labels:dates, datasets:[...datasets, thr(3), thr(-3)] },
    options:{ responsive:true, animation:false, interaction:{mode:"index",intersect:false},
      plugins:{ legend:{labels:{color:"#c7ccd6",boxWidth:14,font:{size:11},
                  filter:(item,data)=>!data.datasets[item.datasetIndex]._threshold}},
        tooltip:{ filter:item=>!item.dataset._threshold,
          callbacks:{label:c=>c.parsed.y==null?null:`${c.dataset.label}: z=${c.parsed.y.toFixed(2)}`}} },
      scales:{ x:{ticks:{color:"#8a909c",maxTicksLimit:8,font:{size:10}},grid:{color:"#1c1f27"}},
        y:{title:{display:true,text:lang==="zh"?"稳健 z 分数":"robust z-score",color:"#8a909c",font:{size:11}},
           ticks:{color:"#8a909c",font:{size:10}},grid:{color:"#1c1f27"}} } }
  });

  // watchlist — tier-2 candidates: collected daily, not scored or charted
  const wl=document.getElementById("watchlist");
  if(TIER2.length){
    wl.hidden=false;
    wl.innerHTML=`<b>${T[lang].watchTitle}</b> `+TIER2.map(L=>{
      const days=(lines[L.id]||[]).filter(r=>r.raw_value!=="").length;
      return `<span class="dot"></span>${L.label[lang]} <span class="days">(${T[lang].watchDays(days)})</span>`;
    }).join("&nbsp;&nbsp;&nbsp;");
  } else wl.hidden=true;
}

document.querySelectorAll("#langtoggle button").forEach(b=>b.onclick=()=>{ setLang(b.dataset.lang); render(); });
(async()=>{ await load(); render(); })();
</script>
</body>
